<!-- 
  Cache Refresher Settings Panel
  This template is loaded into the SillyTavern extensions settings panel
-->
<div class="cache_refresher_settings">
    <div class="inline-drawer">
        <!-- Header/Toggle for the settings panel -->
        <div class="inline-drawer-toggle inline-drawer-header">
            <b data-i18n="Cache Refresher">Cache Refresher</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>

        <!-- Settings panel content -->
        <div class="inline-drawer-content">
            <!-- Main toggle switches -->
            <div class="flex-container">
                <input type="checkbox" id="cache_refresher_enabled">
                <span data-i18n="Enable Cache Refresher">Enable Cache Refresher</span>
            </div>
            
            <div class="flex-container" title="Show notifications when cache is refreshed">
                <input type="checkbox" id="cache_refresher_show_notifications" checked>
                <span data-i18n="Show Notifications">Show Notifications</span>
            </div>
            
            <div class="flex-container" title="Show or hide the timer panel">
                <input type="checkbox" id="cache_refresher_show_status_indicator" checked>
                <span data-i18n="Enable timer panel">Enable Timer Panel</span>
            </div>
            
            <div class="flex-container" title="Disable max tokens feature if your provider has issues with this. Will waste all your money on a responce. (responce can be seen in the cmd)">
                <input type="checkbox" id="cache_refresher_disable_max_tokens">
                <span data-i18n="Disable Max Tokens Feature (Not recommended)">Disable Max Tokens Feature (Not recommended)</span>
            </div>

            <div class="flex-container" title="Abort at the first chunk of streaming LLM response">
                <input type="checkbox" id="cache_refresher_truncate_stream" checked>
                <span data-i18n="Truncate Streamed Response">Truncate Streaming Response</span>
            </div>

            <hr>

            <!-- Numeric settings -->
            <div class="flex-container flexFlowColumn" title="Maximum number of cache refreshes to perform">
                <label for="cache_refresher_max_refreshes" data-i18n="Maximum Refreshes">
                    Maximum Refreshes
                </label>
                <div class="flex-container">
                    <input id="cache_refresher_max_refreshes" class="text_pole flex1 wide100p" type="number" min="1" max="1000" value="3">
                </div>
                
                <!-- Refresh interval setting -->
                <div class="cache-refresher-setting-item">
                    <label for="cache_refresher_interval" title="Interval between cache refreshes in minutes">
                        <span>Refresh Interval (minutes)</span>
                        <input type="number" id="cache_refresher_interval" name="cache_refresher_interval" min="0.1" max="1000" step="0.1" class="text_pole textarea_compact">
                    </label>
                </div>
                
                <!-- Maximum tokens setting -->
                <div class="cache-refresher-setting-item">
                    <label for="cache_refresher_max_tokens" title="Maximum tokens to request for cache refresh">
                        <span>Maximum Tokens</span>
                        <input type="number" id="cache_refresher_max_tokens" name="cache_refresher_max_tokens" min="0" max="4096" class="text_pole textarea_compact">
                    </label>
                </div>

                <div class="cache-refresher-setting-item">
                    <label for="cache_refresher_refresh_message" title="Custom message used for the refresh request">
                        <span>Refresh Message</span>
                        <textarea id="cache_refresher_refresh_message" name="cache_refresher_refresh_message" class="text_pole textarea_compact" rows="4">STOP roleplay.
Now you should simply reply "API OK".
overthinking or reasoning is banned to prevent wasting tokens.</textarea>
                    </label>
                </div>
            </div>
            <hr>

            <!-- Status display -->
            <div class="flex-container flexFlowColumn">
                <div class="flex-container">
                    <span>Status: </span>
                    <span id="cache_refresher_status_text">Inactive</span>
                </div>
            </div>
            
            <!-- Add bottom margin for spacing -->
            <div style="margin-bottom: 8px;"></div>
        </div>
    </div>
</div>
